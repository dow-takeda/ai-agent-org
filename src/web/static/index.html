<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent Org - Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", sans-serif;
    background: #7494C0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    background: #7494C0;
    color: #fff;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 17px;
    font-weight: 600;
  }
  .header-icon { font-size: 24px; }
  .header-members { font-size: 12px; font-weight: 400; opacity: 0.8; }
  .header-nav { margin-left: auto; font-size: 13px; font-weight: 500; }
  .header-nav a {
    color: #fff;
    text-decoration: none;
    padding: 6px 12px;
    border: 1px solid rgba(255,255,255,0.5);
    border-radius: 16px;
    transition: background 0.15s;
  }
  .header-nav a:hover { background: rgba(255,255,255,0.15); }

  /* Chat area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px 12px;
    background: #7494C0;
  }

  /* System message */
  .system-msg {
    text-align: center;
    margin: 12px 0;
    font-size: 12px;
    color: rgba(255,255,255,0.8);
  }

  /* Message row */
  .msg-row {
    display: flex;
    align-items: flex-start;
    margin: 6px 0;
    animation: pop-in 0.25s ease-out;
  }

  .avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    margin-right: 8px;
    color: #fff;
  }
  .avatar-pm { background: #06C755; }
  .avatar-engineer { background: #5B86E5; }
  .avatar-reviewer { background: #FF6B6B; }
  .avatar-senior_engineer { background: #9B59B6; }
  .avatar-analyst { background: #F39C12; }

  .msg-content { max-width: 75%; }

  .msg-name {
    font-size: 12px;
    color: rgba(255,255,255,0.85);
    margin-bottom: 3px;
    font-weight: 500;
  }

  .bubble {
    padding: 10px 14px;
    border-radius: 18px;
    border-top-left-radius: 4px;
    font-size: 14px;
    line-height: 1.6;
    word-break: break-word;
    box-shadow: 0 1px 1px rgba(0,0,0,0.08);
  }
  .bubble-pm { background: #D4F5E0; color: #1a1a1a; }
  .bubble-engineer { background: #D6E4FF; color: #1a1a1a; }
  .bubble-reviewer { background: #FFE0E0; color: #1a1a1a; }
  .bubble-senior_engineer { background: #E8D5F5; color: #1a1a1a; }
  .bubble-analyst { background: #FFE9C8; color: #1a1a1a; }

  .bubble h4 { font-size: 13px; font-weight: 700; margin: 8px 0 4px; color: #555; }
  .bubble h4:first-child { margin-top: 0; }
  .bubble ul { margin: 2px 0 6px 18px; font-size: 13px; }
  .bubble li { margin: 2px 0; }
  .bubble ol { margin: 2px 0 6px 18px; font-size: 13px; }

  .badge {
    display: inline-block;
    padding: 3px 14px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .badge-pass { background: #06C755; color: #fff; }
  .badge-fail { background: #FF3B30; color: #fff; }

  /* Summary text */
  .summary-text {
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 4px;
  }

  /* Detail toggle */
  .detail-toggle {
    font-size: 12px;
    color: #888;
    cursor: pointer;
    padding: 4px 0;
    border-top: 1px solid rgba(0,0,0,0.08);
    margin-top: 6px;
    user-select: none;
  }
  .detail-toggle:hover { color: #555; }

  .detail-content {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid rgba(0,0,0,0.08);
  }

  /* Code patches */
  .patch-toggle {
    font-size: 12px;
    color: #5B86E5;
    cursor: pointer;
    margin: 6px 0 2px;
    text-decoration: underline;
  }
  .patch-content {
    display: none;
    background: #1e1e1e;
    color: #d4d4d4;
    padding: 8px 10px;
    border-radius: 8px;
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 11px;
    line-height: 1.5;
    overflow-x: auto;
    margin: 4px 0 8px;
    white-space: pre-wrap;
  }
  .patch-content.open { display: block; }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 12px 18px;
    animation: pop-in 0.25s ease-out;
  }
  .typing-indicator .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #999;
    animation: typing 1.2s infinite;
  }
  .typing-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing {
    0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
    30% { opacity: 1; transform: scale(1); }
  }

  @keyframes pop-in {
    0% { transform: translateY(8px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }

  /* Input area */
  .input-area {
    background: #fff;
    padding: 16px;
    border-top: 1px solid #e0e0e0;
  }

  .form-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    align-items: center;
  }
  .form-row label {
    font-size: 13px;
    font-weight: 600;
    color: #555;
    min-width: 80px;
  }
  .form-row input[type="text"] {
    flex: 1;
    padding: 8px 12px;
    border: 1px solid #ddd;
    border-radius: 20px;
    font-size: 14px;
    outline: none;
  }
  .form-row input[type="text"]:focus { border-color: #5B86E5; }

  textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid #ddd;
    border-radius: 16px;
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
    min-height: 60px;
    outline: none;
  }
  textarea:focus { border-color: #5B86E5; }

  .bottom-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
  }

  .btn-browse {
    background: #f5f5f5;
    border: 1px solid #ddd;
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 14px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .btn-browse:hover { background: #eee; }

  .file-browser {
    background: #f9f9f9;
    border: 1px solid #eee;
    border-radius: 12px;
    margin-bottom: 10px;
    max-height: 250px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .file-browser-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: #f0f0f0;
    border-bottom: 1px solid #eee;
    font-size: 12px;
    color: #555;
  }
  .file-browser-header span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .btn-browser-up, .btn-browser-select {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 11px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .btn-browser-up:hover, .btn-browser-select:hover { background: #eee; }
  .file-browser-list {
    overflow-y: auto;
    flex: 1;
  }
  .file-entry {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    font-size: 13px;
    cursor: pointer;
    border-bottom: 1px solid #f0f0f0;
  }
  .file-entry:hover { background: #e8e8e8; }
  .file-entry-icon { font-size: 14px; flex-shrink: 0; }
  .file-entry-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .btn-send {
    margin-left: auto;
    background: #06C755;
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 42px;
    height: 42px;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.15s;
  }
  .btn-send:hover { opacity: 0.85; }
  .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Initial welcome */
  .welcome {
    text-align: center;
    margin-top: 60px;
    color: rgba(255,255,255,0.7);
    font-size: 14px;
    line-height: 1.8;
  }
  .welcome-icon { font-size: 48px; margin-bottom: 12px; }

  /* Approval dialog */
  .approval-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    animation: pop-in 0.2s ease-out;
  }
  .approval-dialog {
    background: #fff;
    border-radius: 16px;
    padding: 24px;
    max-width: 500px;
    width: 90%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }
  .approval-dialog h3 { font-size: 16px; margin-bottom: 12px; color: #333; }
  .approval-dialog .summary { font-size: 14px; color: #555; margin-bottom: 12px; line-height: 1.5; }
  .approval-dialog .details-pre {
    background: #f5f5f5;
    border-radius: 8px;
    padding: 10px;
    font-size: 12px;
    max-height: 200px;
    overflow-y: auto;
    margin-bottom: 16px;
    white-space: pre-wrap;
    font-family: monospace;
  }
  .approval-dialog textarea {
    width: 100%;
    min-height: 50px;
    margin-bottom: 12px;
    border-radius: 8px;
  }
  .approval-btns {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }
  .approval-btns button {
    padding: 8px 20px;
    border-radius: 20px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-approve { background: #06C755; color: #fff; }
  .btn-reject { background: #FF3B30; color: #fff; }

  /* Settings panel */
  .settings-toggle {
    font-size: 13px;
    color: #5B86E5;
    cursor: pointer;
    margin-bottom: 10px;
    user-select: none;
    display: inline-block;
  }
  .settings-toggle:hover { text-decoration: underline; }

  .settings-panel {
    display: none;
    background: #f9f9f9;
    border: 1px solid #eee;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 10px;
  }
  .settings-panel.open { display: block; }

  .settings-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }
  .settings-row:last-child { margin-bottom: 0; }
  .settings-row label {
    font-size: 12px;
    font-weight: 600;
    color: #555;
    min-width: 30px;
  }
  .settings-row select {
    flex: 1;
    padding: 5px 8px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 12px;
    outline: none;
    background: #fff;
  }
  .settings-row select:focus { border-color: #5B86E5; }

  /* Theme tabs */
  .theme-tabs {
    display: flex;
    gap: 6px;
    padding: 8px 14px;
    background: #6582ab;
    overflow-x: auto;
  }
  .theme-tab {
    padding: 7px 14px;
    border-radius: 16px;
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.25);
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
  }
  .theme-tab:hover { background: rgba(255,255,255,0.2); }
  .theme-tab.active {
    background: #fff;
    color: #2c4770;
    border-color: #fff;
  }

  /* Role row with count controls + prompt editor */
  .role-group {
    border-top: 1px solid #eee;
    padding: 8px 0;
  }
  .role-group:first-child { border-top: none; }
  .role-group-header {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 600;
    color: #555;
    margin-bottom: 4px;
  }
  .role-group-header .role-label { flex: 1; }
  .role-count-btn {
    background: #f5f5f5;
    border: 1px solid #ddd;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    font-size: 14px;
    line-height: 1;
    cursor: pointer;
    padding: 0;
    color: #555;
  }
  .role-count-btn:hover { background: #eee; }
  .role-count-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .role-count-num { min-width: 22px; text-align: center; }

  .prompt-toggle {
    font-size: 11px;
    color: #5B86E5;
    cursor: pointer;
    padding: 2px 0;
    user-select: none;
    margin-left: auto;
  }
  .prompt-toggle:hover { color: #3f6ad0; }

  .prompt-editor {
    margin-top: 4px;
    display: none;
  }
  .prompt-editor.open { display: block; }
  .prompt-editor textarea {
    width: 100%;
    min-height: 120px;
    padding: 8px 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 12px;
    font-family: "SF Mono", "Fira Code", monospace;
    resize: vertical;
    outline: none;
  }
  .prompt-editor textarea:focus { border-color: #5B86E5; }
  .prompt-editor-hint {
    font-size: 10px;
    color: #999;
    margin-bottom: 4px;
  }

  .theme-description {
    font-size: 11px;
    color: #999;
    margin: 2px 0 8px;
  }
</style>
</head>
<body>

<div class="header">
  <span class="header-icon">💬</span>
  <div>
    AI エージェント組織
    <div class="header-members" id="themeDescription">テーマを選んで依頼を送信</div>
  </div>
  <div class="header-nav"><a href="/talk">🗨 談話室へ</a></div>
</div>

<div class="theme-tabs" id="themeTabs">
  <!-- 動的にloadThemesで生成 -->
</div>

<div class="chat-area" id="chatArea">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">🤖</div>
    テーマを選び依頼内容を入力すると<br>
    AIチームが検討を開始します
  </div>
</div>

<div class="input-area">
  <form id="runForm" onsubmit="return false;">
    <div class="form-row" id="sourcePathRow">
      <label>ソースパス</label>
      <input type="text" id="sourcePath" name="source_path" placeholder="/path/to/target/source">
      <button type="button" class="btn-browse" onclick="toggleBrowser()">📂</button>
    </div>
    <div class="file-browser" id="fileBrowser" style="display:none">
      <div class="file-browser-header">
        <span id="browserPath">...</span>
        <button type="button" class="btn-browser-up" onclick="browseUp()">⬆ 上へ</button>
        <button type="button" class="btn-browser-select" onclick="selectCurrentDir()">✓ このディレクトリを選択</button>
      </div>
      <div class="file-browser-list" id="browserList"></div>
    </div>

    <div class="settings-toggle" onclick="toggleSettings()">⚙ エージェント設定 ▼</div>
    <div class="settings-panel" id="settingsPanel">
      <!-- 動的にrenderThemeSettingsで生成 -->
    </div>

    <textarea id="requestText" name="request_text" placeholder="依頼内容を入力してください"></textarea>
    <div class="bottom-row">
      <button type="button" class="btn-send" id="btnSend" onclick="startRun()">▶</button>
    </div>
  </form>
</div>

<script>
const AGENTS = {
  senior_engineer: { name: "Senior Eng", avatar: "🏗️", bubbleClass: "bubble-senior_engineer", avatarClass: "avatar-senior_engineer" },
  senior_tiebreak: { name: "Senior (裁定)", avatar: "⚖️", bubbleClass: "bubble-senior_engineer", avatarClass: "avatar-senior_engineer" },
  pm:            { name: "PM",           avatar: "📋", bubbleClass: "bubble-pm",       avatarClass: "avatar-pm" },
  engineer:      { name: "Engineer",     avatar: "🔧", bubbleClass: "bubble-engineer", avatarClass: "avatar-engineer" },
  reviewer:      { name: "Reviewer",     avatar: "🔍", bubbleClass: "bubble-reviewer", avatarClass: "avatar-reviewer" },
  pm_tiebreak:   { name: "PM (裁定)",    avatar: "⚖️", bubbleClass: "bubble-pm",       avatarClass: "avatar-pm" },
  analyst:       { name: "Analyst",      avatar: "🔬", bubbleClass: "bubble-analyst",  avatarClass: "avatar-analyst" },
};

function _getAgent(key) {
  if (AGENTS[key]) return AGENTS[key];
  // engineer_3, reviewer_4, analyst_2 など動的エージェントにフォールバック
  if (key.startsWith("engineer")) {
    const num = key.replace("engineer_", "");
    return { name: `Engineer ${num}`, avatar: "🔧", bubbleClass: "bubble-engineer", avatarClass: "avatar-engineer" };
  }
  if (key.startsWith("reviewer")) {
    const num = key.replace("reviewer_", "");
    return { name: `Reviewer ${num}`, avatar: "🔍", bubbleClass: "bubble-reviewer", avatarClass: "avatar-reviewer" };
  }
  if (key.startsWith("analyst")) {
    const num = key.replace("analyst_", "");
    return { name: `Analyst ${num}`, avatar: "🔬", bubbleClass: "bubble-analyst", avatarClass: "avatar-analyst" };
  }
  return { name: key, avatar: "🤖", bubbleClass: "bubble-pm", avatarClass: "avatar-pm" };
}

let currentRunId = null;

const chatArea = document.getElementById("chatArea");
let typingEl = null;

function toggleSettings() {
  document.getElementById("settingsPanel").classList.toggle("open");
}

function _createSettingsRow(roleId, index, personalities, tones) {
  const row = document.createElement("div");
  row.className = "settings-row";
  row.setAttribute("data-role", roleId);
  row.setAttribute("data-index", String(index));
  const suffix = index > 1 ? ` ${index}` : "";
  row.innerHTML = `<label class="inline-label">#${index}</label>`;

  const pSel = document.createElement("select");
  pSel.className = "personality-select";
  pSel.innerHTML = '<option value="">パーソナリティ: デフォルト</option>';
  for (const p of personalities) {
    const opt = document.createElement("option");
    opt.value = p.id;
    opt.textContent = `${p.name} — ${p.focus}`;
    pSel.appendChild(opt);
  }
  row.appendChild(pSel);

  const tSel = document.createElement("select");
  tSel.className = "tone-select";
  tSel.innerHTML = '<option value="">口調: デフォルト</option>';
  for (const t of tones) {
    const opt = document.createElement("option");
    opt.value = t.id;
    opt.textContent = t.name;
    tSel.appendChild(opt);
  }
  row.appendChild(tSel);
  return row;
}

// --- Theme-aware settings ---
// themeState: { themes, personalities, tones, config, currentThemeId, prompts:{themeId->{roleId->text}}, counts:{themeId->{roleId->int}}, edited:{themeId->{roleId:{index:{personality,tone,prompt}}}} }
const themeState = {
  themes: [],
  personalities: {},
  tones: [],
  config: {},
  currentThemeId: null,
  promptsByTheme: {},
  countsByTheme: {},
  editsByTheme: {},
};

async function loadSettings() {
  try {
    const [cRes, thRes, pRes, tRes] = await Promise.all([
      fetch("/api/config"),
      fetch("/api/themes"),
      fetch("/api/personalities"),
      fetch("/api/tones"),
    ]);
    themeState.config = await cRes.json();
    themeState.themes = await thRes.json();
    themeState.personalities = await pRes.json();
    themeState.tones = await tRes.json();

    renderThemeTabs();

    // コンテナ内ならデフォルトソースパスを設定
    if (themeState.config.default_source) {
      const sp = document.getElementById("sourcePath");
      if (!sp.value) sp.value = themeState.config.default_source;
    }

    // 初期テーマ選択（改修要望をデフォルト）
    const initial = themeState.themes.find(t => t.id === "modification") || themeState.themes[0];
    if (initial) await selectTheme(initial.id);
  } catch (e) {
    console.warn("Failed to load settings:", e);
  }
}

function renderThemeTabs() {
  const bar = document.getElementById("themeTabs");
  bar.innerHTML = "";
  for (const theme of themeState.themes) {
    const tab = document.createElement("div");
    tab.className = "theme-tab";
    tab.setAttribute("data-theme-id", theme.id);
    tab.textContent = theme.name;
    tab.onclick = () => selectTheme(theme.id);
    bar.appendChild(tab);
  }
}

async function selectTheme(themeId) {
  captureCurrentEdits();
  themeState.currentThemeId = themeId;
  // Tab active state
  document.querySelectorAll(".theme-tab").forEach(el => {
    el.classList.toggle("active", el.getAttribute("data-theme-id") === themeId);
  });
  const theme = themeState.themes.find(t => t.id === themeId);
  if (!theme) return;

  // Theme description
  document.getElementById("themeDescription").textContent = theme.description;

  // Request label & placeholder
  const txt = document.getElementById("requestText");
  txt.placeholder = theme.request_placeholder || "依頼内容を入力してください";

  // Source path visibility
  const row = document.getElementById("sourcePathRow");
  const sp = document.getElementById("sourcePath");
  if (theme.source_path_mode === "unused") {
    row.style.display = "none";
    sp.required = false;
  } else {
    row.style.display = "flex";
    sp.required = theme.source_path_mode === "required";
  }

  // Prompts
  if (!themeState.promptsByTheme[themeId]) {
    try {
      const res = await fetch(`/api/themes/${themeId}/prompts`);
      const data = await res.json();
      if (!data.error) themeState.promptsByTheme[themeId] = data;
    } catch (e) {
      console.warn("Failed to load prompts:", e);
      themeState.promptsByTheme[themeId] = {};
    }
  }

  // Counts (初期値: role.default_count)
  if (!themeState.countsByTheme[themeId]) {
    themeState.countsByTheme[themeId] = {};
    for (const role of theme.roles) {
      themeState.countsByTheme[themeId][role.role_id] = role.default_count;
    }
  }

  renderThemeSettings(theme);
}

function renderThemeSettings(theme) {
  const panel = document.getElementById("settingsPanel");
  panel.innerHTML = "";
  const themeId = theme.id;
  const prompts = themeState.promptsByTheme[themeId] || {};
  const counts = themeState.countsByTheme[themeId] || {};
  const edits = themeState.editsByTheme[themeId] || {};

  for (const role of theme.roles) {
    const count = counts[role.role_id] || role.default_count;
    const group = document.createElement("div");
    group.className = "role-group";
    group.setAttribute("data-role-id", role.role_id);

    // Header with count +/-
    const header = document.createElement("div");
    header.className = "role-group-header";
    const label = document.createElement("span");
    label.className = "role-label";
    label.textContent = role.display_name;
    header.appendChild(label);

    if (role.max_count > role.min_count) {
      const minus = document.createElement("button");
      minus.type = "button";
      minus.className = "role-count-btn";
      minus.textContent = "−";
      minus.disabled = count <= role.min_count;
      minus.onclick = () => changeRoleCount(role.role_id, -1);
      header.appendChild(minus);
      const num = document.createElement("span");
      num.className = "role-count-num";
      num.textContent = String(count);
      header.appendChild(num);
      const plus = document.createElement("button");
      plus.type = "button";
      plus.className = "role-count-btn";
      plus.textContent = "+";
      plus.disabled = count >= role.max_count;
      plus.onclick = () => changeRoleCount(role.role_id, +1);
      header.appendChild(plus);
    }

    const promptToggle = document.createElement("span");
    promptToggle.className = "prompt-toggle";
    promptToggle.textContent = "✏ プロンプト";
    promptToggle.onclick = () => {
      const editor = group.querySelector(".prompt-editor");
      if (editor) editor.classList.toggle("open");
    };
    header.appendChild(promptToggle);
    group.appendChild(header);

    // 役職ごとの個別行（index 1..count）
    const personalityList = themeState.personalities[role.role_id] || [];
    for (let i = 1; i <= count; i++) {
      const editKey = `${role.role_id}__${i}`;
      const edit = edits[editKey] || {};
      const row = _createSettingsRow(role.role_id, i, personalityList, themeState.tones);
      const pSel = row.querySelector(".personality-select");
      const tSel = row.querySelector(".tone-select");
      if (edit.personality) pSel.value = edit.personality;
      if (edit.tone) tSel.value = edit.tone;
      group.appendChild(row);
    }

    // Prompt editor
    const editor = document.createElement("div");
    editor.className = "prompt-editor";
    const hint = document.createElement("div");
    hint.className = "prompt-editor-hint";
    hint.textContent = "このテーマのこの役職が使うシステムプロンプト（この実行のみ有効）";
    editor.appendChild(hint);
    const ta = document.createElement("textarea");
    ta.className = "prompt-textarea";
    ta.setAttribute("data-role-id", role.role_id);
    const savedPrompt = edits.__prompts?.[role.role_id];
    ta.value = savedPrompt !== undefined ? savedPrompt : (prompts[role.role_id] || "");
    editor.appendChild(ta);
    group.appendChild(editor);

    panel.appendChild(group);
  }
}

function changeRoleCount(roleId, delta) {
  captureCurrentEdits();
  const themeId = themeState.currentThemeId;
  const theme = themeState.themes.find(t => t.id === themeId);
  const role = theme.roles.find(r => r.role_id === roleId);
  if (!role) return;
  const current = themeState.countsByTheme[themeId][roleId] || role.default_count;
  const next = Math.max(role.min_count, Math.min(role.max_count, current + delta));
  themeState.countsByTheme[themeId][roleId] = next;
  renderThemeSettings(theme);
}

function captureCurrentEdits() {
  // 現在のテーマの UI 状態（personality/tone/prompt）を themeState.editsByTheme に保存
  const themeId = themeState.currentThemeId;
  if (!themeId) return;
  themeState.editsByTheme[themeId] = themeState.editsByTheme[themeId] || {};
  const bag = themeState.editsByTheme[themeId];
  bag.__prompts = bag.__prompts || {};

  document.querySelectorAll(".settings-row[data-role]").forEach(row => {
    const roleId = row.getAttribute("data-role");
    const index = row.getAttribute("data-index");
    const pSel = row.querySelector(".personality-select");
    const tSel = row.querySelector(".tone-select");
    bag[`${roleId}__${index}`] = {
      personality: pSel ? pSel.value : "",
      tone: tSel ? tSel.value : "",
    };
  });
  document.querySelectorAll(".prompt-textarea").forEach(ta => {
    const roleId = ta.getAttribute("data-role-id");
    bag.__prompts[roleId] = ta.value;
  });
}

// --- ファイルブラウザ ---
let _browserCurrentPath = "";

function toggleBrowser() {
  const el = document.getElementById("fileBrowser");
  if (el.style.display === "none") {
    const sp = document.getElementById("sourcePath").value.trim();
    const startPath = sp || "/";
    browseTo(startPath);
    el.style.display = "flex";
  } else {
    el.style.display = "none";
  }
}

async function browseTo(path) {
  _browserCurrentPath = path;
  document.getElementById("browserPath").textContent = path;
  const list = document.getElementById("browserList");
  list.innerHTML = "<div style='padding:8px;color:#999;font-size:12px'>読み込み中...</div>";
  try {
    const res = await fetch(`/api/browse?path=${encodeURIComponent(path)}`);
    const data = await res.json();
    if (data.error) {
      list.innerHTML = `<div style='padding:8px;color:#c00;font-size:12px'>${data.error}</div>`;
      return;
    }
    list.innerHTML = "";
    for (const entry of data.entries) {
      const div = document.createElement("div");
      div.className = "file-entry";
      const icon = entry.is_dir ? "📁" : "📄";
      div.innerHTML = `<span class="file-entry-icon">${icon}</span><span class="file-entry-name">${entry.name}</span>`;
      if (entry.is_dir) {
        div.onclick = () => browseTo(entry.path);
      } else {
        div.onclick = () => {
          document.getElementById("sourcePath").value = entry.path;
          document.getElementById("fileBrowser").style.display = "none";
        };
      }
      list.appendChild(div);
    }
    if (data.entries.length === 0) {
      list.innerHTML = "<div style='padding:8px;color:#999;font-size:12px'>空のディレクトリ</div>";
    }
  } catch (e) {
    list.innerHTML = `<div style='padding:8px;color:#c00;font-size:12px'>エラー: ${e.message}</div>`;
  }
}

function browseUp() {
  if (!_browserCurrentPath || _browserCurrentPath === "/") return;
  const parent = _browserCurrentPath.replace(/\/[^/]+\/?$/, "") || "/";
  browseTo(parent);
}

function selectCurrentDir() {
  document.getElementById("sourcePath").value = _browserCurrentPath;
  document.getElementById("fileBrowser").style.display = "none";
}

document.addEventListener("DOMContentLoaded", loadSettings);

function scrollToBottom() {
  chatArea.scrollTop = chatArea.scrollHeight;
}

function addSystemMessage(text) {
  const div = document.createElement("div");
  div.className = "system-msg";
  div.textContent = text;
  chatArea.appendChild(div);
  scrollToBottom();
}

function showTyping(agentKey) {
  removeTyping();
  const agent = _getAgent(agentKey);
  const row = document.createElement("div");
  row.className = "msg-row";
  row.innerHTML = `
    <div class="avatar ${agent.avatarClass}">${agent.avatar}</div>
    <div class="msg-content">
      <div class="msg-name">${agent.name}</div>
      <div class="bubble ${agent.bubbleClass} typing-indicator">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    </div>
  `;
  typingEl = row;
  chatArea.appendChild(row);
  scrollToBottom();
}

function removeTyping() {
  if (typingEl) {
    typingEl.remove();
    typingEl = null;
  }
}

function addBubble(agentKey, html, nameOverride) {
  removeTyping();
  const agent = _getAgent(agentKey);
  const displayName = nameOverride || agent.name;
  const row = document.createElement("div");
  row.className = "msg-row";
  row.innerHTML = `
    <div class="avatar ${agent.avatarClass}">${agent.avatar}</div>
    <div class="msg-content">
      <div class="msg-name">${displayName}</div>
      <div class="bubble ${agent.bubbleClass}">${html}</div>
    </div>
  `;
  chatArea.appendChild(row);
  scrollToBottom();
}

function toggleDetail(id) {
  const el = document.getElementById(id);
  const toggle = el.previousElementSibling;
  if (el.style.display === "none") {
    el.style.display = "block";
    toggle.textContent = "詳細を隠す ▲";
  } else {
    el.style.display = "none";
    toggle.textContent = "詳細を表示 ▼";
  }
}

function formatSeniorEngineer(output) {
  const id = "detail-" + Date.now() + "-" + Math.random().toString(36).slice(2, 6);
  let summary = escHtml(output.summary || "").replace(/\n/g, "<br>");

  let detail = "<h4>影響範囲ファイル</h4><ul>";
  for (const f of output.impact_files || []) detail += `<li>${escHtml(f)}</li>`;
  detail += "</ul><h4>分析</h4><p>" + escHtml(output.analysis || "").replace(/\n/g, "<br>") + "</p>";

  return `<div class="summary-text">${summary}</div>` +
         `<div class="detail-toggle" onclick="toggleDetail('${id}')">詳細を表示 ▼</div>` +
         `<div class="detail-content" id="${id}" style="display:none">${detail}</div>`;
}

function formatPM(output) {
  const id = "detail-" + Date.now() + "-" + Math.random().toString(36).slice(2, 6);
  let summary = escHtml(output.summary || "").replace(/\n/g, "<br>");

  let detail = "<h4>要件</h4><ul>";
  for (const r of output.requirements || []) detail += `<li>${escHtml(r)}</li>`;
  detail += "</ul><h4>タスク</h4><ol>";
  for (const t of output.tasks || []) detail += `<li>${escHtml(t)}</li>`;
  detail += "</ol><h4>受入基準</h4><ul>";
  for (const a of output.acceptance_criteria || []) detail += `<li>${escHtml(a)}</li>`;
  detail += "</ul>";
  if ((output.referenced_files || []).length > 0) {
    detail += "<h4>参照ファイル</h4><ul>";
    for (const f of output.referenced_files) detail += `<li>${escHtml(f)}</li>`;
    detail += "</ul>";
  }

  return `<div class="summary-text">${summary}</div>` +
         `<div class="detail-toggle" onclick="toggleDetail('${id}')">詳細を表示 ▼</div>` +
         `<div class="detail-content" id="${id}" style="display:none">${detail}</div>`;
}

function formatEngineer(output) {
  const id = "detail-" + Date.now() + "-" + Math.random().toString(36).slice(2, 6);
  let summary = escHtml(output.summary || "").replace(/\n/g, "<br>");

  let detail = "<h4>設計ノート</h4><p>" + escHtml(output.design_notes || "").replace(/\n/g, "<br>") + "</p>";
  const patches = output.code_patches || [];
  if (patches.length > 0) {
    detail += `<h4>コードパッチ (${patches.length}件)</h4>`;
    for (let i = 0; i < patches.length; i++) {
      const p = patches[i];
      const patchId = "patch-" + Date.now() + "-" + i;
      detail += `<div class="patch-toggle" onclick="togglePatch('${patchId}')">${escHtml(p.file_path)} — ${escHtml(p.description)}</div>`;
      detail += `<div class="patch-content" id="${patchId}">${escHtml(p.patch)}</div>`;
    }
  }
  if ((output.assumptions || []).length > 0) {
    detail += "<h4>前提事項</h4><ul>";
    for (const a of output.assumptions) detail += `<li>${escHtml(a)}</li>`;
    detail += "</ul>";
  }

  return `<div class="summary-text">${summary}</div>` +
         `<div class="detail-toggle" onclick="toggleDetail('${id}')">詳細を表示 ▼</div>` +
         `<div class="detail-content" id="${id}" style="display:none">${detail}</div>`;
}

function formatReviewer(output) {
  const id = "detail-" + Date.now() + "-" + Math.random().toString(36).slice(2, 6);
  let summary = escHtml(output.summary || "").replace(/\n/g, "<br>");

  const isPASS = output.review_result === "PASS";
  let detail = `<span class="badge ${isPASS ? "badge-pass" : "badge-fail"}">${escHtml(output.review_result)}</span>`;
  if ((output.issues || []).length > 0) {
    detail += "<h4>指摘事項</h4><ul>";
    for (const i of output.issues) detail += `<li>${escHtml(i)}</li>`;
    detail += "</ul>";
  }
  if ((output.fix_instructions || []).length > 0) {
    detail += "<h4>修正指示</h4><ul>";
    for (const f of output.fix_instructions) detail += `<li>${escHtml(f)}</li>`;
    detail += "</ul>";
  }

  return `<div class="summary-text">${summary}</div>` +
         `<div class="detail-toggle" onclick="toggleDetail('${id}')">詳細を表示 ▼</div>` +
         `<div class="detail-content" id="${id}" style="display:none">${detail}</div>`;
}

function escHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function togglePatch(id) {
  document.getElementById(id).classList.toggle("open");
}

function showApprovalDialog(data) {
  const overlay = document.createElement("div");
  overlay.className = "approval-overlay";
  overlay.innerHTML = `
    <div class="approval-dialog">
      <h3>承認リクエスト</h3>
      <div class="summary">${escHtml(data.summary || "")}</div>
      <div class="details-pre">${escHtml(JSON.stringify(data.details || {}, null, 2))}</div>
      <textarea id="approvalFeedback" placeholder="フィードバック（任意）"></textarea>
      <div class="approval-btns">
        <button class="btn-reject" onclick="submitApproval(false, true)">終了</button>
        <button class="btn-reject" onclick="submitApproval(false, false)">却下して再実行</button>
        <button class="btn-approve" onclick="submitApproval(true, false)">承認</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
}

async function submitApproval(approved, terminate) {
  const overlay = document.querySelector(".approval-overlay");
  const feedback = document.getElementById("approvalFeedback")?.value || "";
  if (overlay) overlay.remove();

  if (!currentRunId) return;
  const formData = new FormData();
  formData.append("approved", approved);
  formData.append("feedback", feedback);
  formData.append("terminate", terminate);
  await fetch(`/api/run/${currentRunId}/approve`, { method: "POST", body: formData });
  const msg = terminate ? "終了を指示しました" : approved ? "承認しました" : "却下しました";
  addSystemMessage(msg);
}

async function startRun() {
  const btn = document.getElementById("btnSend");
  const sourcePath = document.getElementById("sourcePath").value.trim();
  const requestText = document.getElementById("requestText").value.trim();
  const themeId = themeState.currentThemeId;
  const theme = themeState.themes.find(t => t.id === themeId);

  if (!theme) { alert("テーマを選択してください"); return; }
  if (theme.source_path_mode === "required" && !sourcePath) {
    alert("ソースパスを入力してください"); return;
  }
  if (!requestText) { alert("依頼内容を入力してください"); return; }

  captureCurrentEdits();

  btn.disabled = true;
  document.getElementById("welcome")?.remove();

  // Show user message
  addSystemMessage(`${theme.name}を送信しました`);

  // Build roles[] payload
  const roles = [];
  const counts = themeState.countsByTheme[themeId] || {};
  const edits = themeState.editsByTheme[themeId] || {};
  const editPrompts = edits.__prompts || {};
  const defaultPrompts = themeState.promptsByTheme[themeId] || {};
  for (const role of theme.roles) {
    const n = counts[role.role_id] || role.default_count;
    for (let i = 1; i <= n; i++) {
      const e = edits[`${role.role_id}__${i}`] || {};
      const currentPrompt = editPrompts[role.role_id];
      const isEdited = currentPrompt !== undefined && currentPrompt !== defaultPrompts[role.role_id];
      roles.push({
        role_id: role.role_id,
        index: i,
        personality_id: e.personality || null,
        tone_id: e.tone || null,
        // Only send prompt_override if user actually edited it
        prompt_override: isEdited ? currentPrompt : null,
      });
    }
  }

  const body = {
    theme_id: themeId,
    request_text: requestText,
    source_path: sourcePath,
    roles,
  };

  try {
    const res = await fetch("/api/run", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (data.error) { alert("実行エラー: " + data.error); btn.disabled = false; return; }
    const run_id = data.run_id;
    currentRunId = run_id;

    const eventSource = new EventSource(`/api/run/${run_id}/events`);
    eventSource.onmessage = (e) => {
      const event = JSON.parse(e.data);
      const agentKey = event.agent || "pm";
      const pName = event.data?.personality_name;
      const displayName = pName ? `${_getAgent(agentKey).name} (${pName})` : null;

      switch (event.type) {
        case "pipeline_start":
          addSystemMessage("パイプライン開始");
          break;
        case "agent_start":
          showTyping(agentKey);
          break;
        case "agent_complete":
          if (agentKey === "senior_engineer") {
            addBubble(agentKey, formatSeniorEngineer(event.data.output), displayName);
          } else if (agentKey.startsWith("pm") && !agentKey.includes("tiebreak")) {
            addBubble(agentKey, formatPM(event.data.output), displayName);
          } else if (agentKey.startsWith("engineer")) {
            addBubble(agentKey, formatEngineer(event.data.output), displayName);
          } else if (agentKey.startsWith("reviewer")) {
            addBubble(agentKey, formatReviewer(event.data.output), displayName);
          } else if (agentKey === "pm_tiebreak") {
            const output = event.data.output;
            if (output.code_patches) addBubble("pm_tiebreak", formatEngineer(output), displayName);
            else addBubble("pm_tiebreak", formatReviewer(output), displayName);
          }
          break;
        case "approval_request":
          removeTyping();
          showApprovalDialog(event.data);
          break;
        case "discussion_round": {
          const r = event.data.round || "?";
          const total = event.data.total_rounds || "?";
          const cnt = event.data.agent_count || "?";
          const role = agentKey === "engineer" ? "Engineer" : "Reviewer";
          addSystemMessage(`💬 ${role} 議論ラウンド ${r}/${total}（${cnt}人が相互レビュー中）`);
          break;
        }
        case "discussion_converged": {
          const role2 = agentKey === "engineer" ? "Engineer" : "Reviewer";
          addSystemMessage(`✅ ${role2} の議論が収束しました — 合意に到達`);
          break;
        }
        case "pm_tiebreak":
          addSystemMessage("PM が裁定を行います...");
          showTyping("pm");
          break;
        case "rollback_proposed":
          addSystemMessage(`差し戻し提案: ${event.data.proposal?.reason || ""}`);
          break;
        case "rollback_review_start":
          addSystemMessage("PM が差し戻し提案を精査中...");
          showTyping("pm");
          break;
        case "rollback_review_complete":
          removeTyping();
          addSystemMessage("PM 差し戻し判断: " + (event.data.decision?.approved ? "承認" : "棄却"));
          break;
        case "rollback":
          addSystemMessage(`差し戻し実行 (${event.data.attempt || "?"}回目): ${event.data.source} → ${event.data.target}`);
          break;
        case "rollback_limit_reached":
          addSystemMessage(`差し戻し上限 (${event.data.count}回) に到達しました`);
          break;
        case "review_fail_retry":
          addSystemMessage(`レビューFAIL → 修正指示で再実行 (${event.data.attempt || "?"}回目)`);
          break;
        case "pipeline_complete": {
          removeTyping();
          const d = event.data;
          const result = d.review_result;
          const badge = result === "PASS" ? "✅ PASS" : result === "FAIL" ? "❌ FAIL" : "";
          let summaryHtml = `<strong>パイプライン完了</strong>`;
          if (badge) summaryHtml += ` — ${badge}`;
          if (d.steps) summaryHtml += `<br>ステップ数: ${d.steps}`;
          if (d.issues && d.issues.length > 0) {
            summaryHtml += `<br>指摘事項: ${d.issues.length}件`;
          }
          if (d.output_dir) summaryHtml += `<br>出力: ${d.output_dir}`;
          const div = document.createElement("div");
          div.className = "system-msg";
          div.innerHTML = summaryHtml;
          chatArea.appendChild(div);
          scrollToBottom();
          eventSource.close();
          btn.disabled = false;
          currentRunId = null;
          break;
        }
        case "pipeline_error":
          removeTyping();
          addSystemMessage("エラー: " + (event.data.error || "不明なエラー"));
          eventSource.close();
          btn.disabled = false;
          currentRunId = null;
          break;
        case "done":
          eventSource.close();
          btn.disabled = false;
          currentRunId = null;
          break;
      }
    };
    eventSource.onerror = () => {
      removeTyping();
      addSystemMessage("接続が切断されました");
      eventSource.close();
      btn.disabled = false;
    };
  } catch (err) {
    addSystemMessage("送信に失敗しました: " + err.message);
    btn.disabled = false;
  }
}

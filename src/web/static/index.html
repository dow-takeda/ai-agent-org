<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent Org - Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", sans-serif;
    background: #7494C0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    background: #7494C0;
    color: #fff;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 17px;
    font-weight: 600;
  }
  .header-icon { font-size: 24px; }
  .header-members { font-size: 12px; font-weight: 400; opacity: 0.8; }

  /* Chat area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px 12px;
    background: #7494C0;
  }

  /* System message */
  .system-msg {
    text-align: center;
    margin: 12px 0;
    font-size: 12px;
    color: rgba(255,255,255,0.8);
  }

  /* Message row */
  .msg-row {
    display: flex;
    align-items: flex-start;
    margin: 6px 0;
    animation: pop-in 0.25s ease-out;
  }

  .avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    margin-right: 8px;
    color: #fff;
  }
  .avatar-pm { background: #06C755; }
  .avatar-engineer { background: #5B86E5; }
  .avatar-reviewer { background: #FF6B6B; }

  .msg-content { max-width: 75%; }

  .msg-name {
    font-size: 12px;
    color: rgba(255,255,255,0.85);
    margin-bottom: 3px;
    font-weight: 500;
  }

  .bubble {
    padding: 10px 14px;
    border-radius: 18px;
    border-top-left-radius: 4px;
    font-size: 14px;
    line-height: 1.6;
    word-break: break-word;
    box-shadow: 0 1px 1px rgba(0,0,0,0.08);
  }
  .bubble-pm { background: #D4F5E0; color: #1a1a1a; }
  .bubble-engineer { background: #D6E4FF; color: #1a1a1a; }
  .bubble-reviewer { background: #FFE0E0; color: #1a1a1a; }

  .bubble h4 { font-size: 13px; font-weight: 700; margin: 8px 0 4px; color: #555; }
  .bubble h4:first-child { margin-top: 0; }
  .bubble ul { margin: 2px 0 6px 18px; font-size: 13px; }
  .bubble li { margin: 2px 0; }
  .bubble ol { margin: 2px 0 6px 18px; font-size: 13px; }

  .badge {
    display: inline-block;
    padding: 3px 14px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .badge-pass { background: #06C755; color: #fff; }
  .badge-fail { background: #FF3B30; color: #fff; }

  /* Code patches */
  .patch-toggle {
    font-size: 12px;
    color: #5B86E5;
    cursor: pointer;
    margin: 6px 0 2px;
    text-decoration: underline;
  }
  .patch-content {
    display: none;
    background: #1e1e1e;
    color: #d4d4d4;
    padding: 8px 10px;
    border-radius: 8px;
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 11px;
    line-height: 1.5;
    overflow-x: auto;
    margin: 4px 0 8px;
    white-space: pre-wrap;
  }
  .patch-content.open { display: block; }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 12px 18px;
    animation: pop-in 0.25s ease-out;
  }
  .typing-indicator .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #999;
    animation: typing 1.2s infinite;
  }
  .typing-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing {
    0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
    30% { opacity: 1; transform: scale(1); }
  }

  @keyframes pop-in {
    0% { transform: translateY(8px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }

  /* Input area */
  .input-area {
    background: #fff;
    padding: 16px;
    border-top: 1px solid #e0e0e0;
  }

  .form-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    align-items: center;
  }
  .form-row label {
    font-size: 13px;
    font-weight: 600;
    color: #555;
    min-width: 80px;
  }
  .form-row input[type="text"] {
    flex: 1;
    padding: 8px 12px;
    border: 1px solid #ddd;
    border-radius: 20px;
    font-size: 14px;
    outline: none;
  }
  .form-row input[type="text"]:focus { border-color: #5B86E5; }

  textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid #ddd;
    border-radius: 16px;
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
    min-height: 60px;
    outline: none;
  }
  textarea:focus { border-color: #5B86E5; }

  .bottom-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
  }

  .file-label {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 13px;
    color: #666;
    cursor: pointer;
    padding: 6px 12px;
    border: 1px solid #ddd;
    border-radius: 20px;
  }
  .file-label:hover { background: #f5f5f5; }
  .file-label input { display: none; }
  .file-name { font-size: 12px; color: #888; }

  .btn-send {
    margin-left: auto;
    background: #06C755;
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 42px;
    height: 42px;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.15s;
  }
  .btn-send:hover { opacity: 0.85; }
  .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Initial welcome */
  .welcome {
    text-align: center;
    margin-top: 60px;
    color: rgba(255,255,255,0.7);
    font-size: 14px;
    line-height: 1.8;
  }
  .welcome-icon { font-size: 48px; margin-bottom: 12px; }

  /* Approval dialog */
  .approval-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    animation: pop-in 0.2s ease-out;
  }
  .approval-dialog {
    background: #fff;
    border-radius: 16px;
    padding: 24px;
    max-width: 500px;
    width: 90%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }
  .approval-dialog h3 { font-size: 16px; margin-bottom: 12px; color: #333; }
  .approval-dialog .summary { font-size: 14px; color: #555; margin-bottom: 12px; line-height: 1.5; }
  .approval-dialog .details-pre {
    background: #f5f5f5;
    border-radius: 8px;
    padding: 10px;
    font-size: 12px;
    max-height: 200px;
    overflow-y: auto;
    margin-bottom: 16px;
    white-space: pre-wrap;
    font-family: monospace;
  }
  .approval-dialog textarea {
    width: 100%;
    min-height: 50px;
    margin-bottom: 12px;
    border-radius: 8px;
  }
  .approval-btns {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }
  .approval-btns button {
    padding: 8px 20px;
    border-radius: 20px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-approve { background: #06C755; color: #fff; }
  .btn-reject { background: #FF3B30; color: #fff; }
</style>
</head>
<body>

<div class="header">
  <span class="header-icon">💬</span>
  <div>
    AI改修チーム
    <div class="header-members">PM, Engineer, Reviewer</div>
  </div>
</div>

<div class="chat-area" id="chatArea">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">🤖</div>
    改修要求を入力して送信すると<br>
    AIチームが検討を開始します
  </div>
</div>

<div class="input-area">
  <form id="runForm" onsubmit="return false;">
    <div class="form-row">
      <label>ソースパス</label>
      <input type="text" id="sourcePath" name="source_path" placeholder="/path/to/target/source" required>
    </div>
    <textarea id="requestText" name="request_text" placeholder="改修要求を入力してください..."></textarea>
    <div class="bottom-row">
      <label class="file-label">
        📎 ファイル
        <input type="file" id="requestFile" name="request_file" onchange="onFileSelect(this)">
      </label>
      <span class="file-name" id="fileName"></span>
      <button type="button" class="btn-send" id="btnSend" onclick="startRun()">▶</button>
    </div>
  </form>
</div>

<script>
const AGENTS = {
  pm:            { name: "PM",           avatar: "📋", bubbleClass: "bubble-pm",       avatarClass: "avatar-pm" },
  engineer:      { name: "Engineer",     avatar: "🔧", bubbleClass: "bubble-engineer", avatarClass: "avatar-engineer" },
  engineer_1:    { name: "Engineer 1",   avatar: "🔧", bubbleClass: "bubble-engineer", avatarClass: "avatar-engineer" },
  engineer_2:    { name: "Engineer 2",   avatar: "🔧", bubbleClass: "bubble-engineer", avatarClass: "avatar-engineer" },
  reviewer:      { name: "Reviewer",     avatar: "🔍", bubbleClass: "bubble-reviewer", avatarClass: "avatar-reviewer" },
  reviewer_1:    { name: "Reviewer 1",   avatar: "🔍", bubbleClass: "bubble-reviewer", avatarClass: "avatar-reviewer" },
  reviewer_2:    { name: "Reviewer 2",   avatar: "🔍", bubbleClass: "bubble-reviewer", avatarClass: "avatar-reviewer" },
  pm_tiebreak:   { name: "PM (裁定)",    avatar: "⚖️", bubbleClass: "bubble-pm",       avatarClass: "avatar-pm" },
};

let currentRunId = null;

const chatArea = document.getElementById("chatArea");
let typingEl = null;

function onFileSelect(input) {
  const name = input.files.length ? input.files[0].name : "";
  document.getElementById("fileName").textContent = name;
}

function scrollToBottom() {
  chatArea.scrollTop = chatArea.scrollHeight;
}

function addSystemMessage(text) {
  const div = document.createElement("div");
  div.className = "system-msg";
  div.textContent = text;
  chatArea.appendChild(div);
  scrollToBottom();
}

function showTyping(agentKey) {
  removeTyping();
  const agent = AGENTS[agentKey];
  const row = document.createElement("div");
  row.className = "msg-row";
  row.innerHTML = `
    <div class="avatar ${agent.avatarClass}">${agent.avatar}</div>
    <div class="msg-content">
      <div class="msg-name">${agent.name}</div>
      <div class="bubble ${agent.bubbleClass} typing-indicator">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    </div>
  `;
  typingEl = row;
  chatArea.appendChild(row);
  scrollToBottom();
}

function removeTyping() {
  if (typingEl) {
    typingEl.remove();
    typingEl = null;
  }
}

function addBubble(agentKey, html) {
  removeTyping();
  const agent = AGENTS[agentKey];
  const row = document.createElement("div");
  row.className = "msg-row";
  row.innerHTML = `
    <div class="avatar ${agent.avatarClass}">${agent.avatar}</div>
    <div class="msg-content">
      <div class="msg-name">${agent.name}</div>
      <div class="bubble ${agent.bubbleClass}">${html}</div>
    </div>
  `;
  chatArea.appendChild(row);
  scrollToBottom();
}

function formatPM(output) {
  let html = "<h4>要件</h4><ul>";
  for (const r of output.requirements || []) html += `<li>${escHtml(r)}</li>`;
  html += "</ul><h4>タスク</h4><ol>";
  for (const t of output.tasks || []) html += `<li>${escHtml(t)}</li>`;
  html += "</ol><h4>受入基準</h4><ul>";
  for (const a of output.acceptance_criteria || []) html += `<li>${escHtml(a)}</li>`;
  html += "</ul>";
  return html;
}

function formatEngineer(output) {
  let html = "<h4>設計ノート</h4><p>" + escHtml(output.design_notes || "").replace(/\n/g, "<br>") + "</p>";
  const patches = output.code_patches || [];
  if (patches.length > 0) {
    html += `<h4>コードパッチ (${patches.length}件)</h4>`;
    for (let i = 0; i < patches.length; i++) {
      const p = patches[i];
      const id = "patch-" + Date.now() + "-" + i;
      html += `<div class="patch-toggle" onclick="togglePatch('${id}')">${escHtml(p.file_path)} — ${escHtml(p.description)}</div>`;
      html += `<div class="patch-content" id="${id}">${escHtml(p.patch)}</div>`;
    }
  }
  if ((output.assumptions || []).length > 0) {
    html += "<h4>前提事項</h4><ul>";
    for (const a of output.assumptions) html += `<li>${escHtml(a)}</li>`;
    html += "</ul>";
  }
  return html;
}

function formatReviewer(output) {
  const isPASS = output.review_result === "PASS";
  let html = `<span class="badge ${isPASS ? "badge-pass" : "badge-fail"}">${escHtml(output.review_result)}</span>`;
  if ((output.issues || []).length > 0) {
    html += "<h4>指摘事項</h4><ul>";
    for (const i of output.issues) html += `<li>${escHtml(i)}</li>`;
    html += "</ul>";
  }
  if ((output.fix_instructions || []).length > 0) {
    html += "<h4>修正指示</h4><ul>";
    for (const f of output.fix_instructions) html += `<li>${escHtml(f)}</li>`;
    html += "</ul>";
  }
  return html;
}

function escHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function togglePatch(id) {
  document.getElementById(id).classList.toggle("open");
}

function showApprovalDialog(data) {
  const overlay = document.createElement("div");
  overlay.className = "approval-overlay";
  overlay.innerHTML = `
    <div class="approval-dialog">
      <h3>承認リクエスト</h3>
      <div class="summary">${escHtml(data.summary || "")}</div>
      <div class="details-pre">${escHtml(JSON.stringify(data.details || {}, null, 2))}</div>
      <textarea id="approvalFeedback" placeholder="フィードバック（任意）"></textarea>
      <div class="approval-btns">
        <button class="btn-reject" onclick="submitApproval(false, true)">終了</button>
        <button class="btn-reject" onclick="submitApproval(false, false)">却下して再実行</button>
        <button class="btn-approve" onclick="submitApproval(true, false)">承認</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
}

async function submitApproval(approved, terminate) {
  const overlay = document.querySelector(".approval-overlay");
  const feedback = document.getElementById("approvalFeedback")?.value || "";
  if (overlay) overlay.remove();

  if (!currentRunId) return;
  const formData = new FormData();
  formData.append("approved", approved);
  formData.append("feedback", feedback);
  formData.append("terminate", terminate);
  await fetch(`/api/run/${currentRunId}/approve`, { method: "POST", body: formData });
  const msg = terminate ? "終了を指示しました" : approved ? "承認しました" : "却下しました";
  addSystemMessage(msg);
}

async function startRun() {
  const btn = document.getElementById("btnSend");
  const sourcePath = document.getElementById("sourcePath").value.trim();
  const requestText = document.getElementById("requestText").value.trim();
  const fileInput = document.getElementById("requestFile");

  if (!sourcePath) { alert("ソースパスを入力してください"); return; }
  if (!requestText && !fileInput.files.length) { alert("要求を入力するか、ファイルを選択してください"); return; }

  btn.disabled = true;
  document.getElementById("welcome")?.remove();

  // Show user message
  addSystemMessage("改修要求を送信しました");

  const formData = new FormData();
  formData.append("source_path", sourcePath);
  formData.append("request_text", requestText);
  if (fileInput.files.length) formData.append("request_file", fileInput.files[0]);

  try {
    const res = await fetch("/api/run", { method: "POST", body: formData });
    const { run_id } = await res.json();
    currentRunId = run_id;

    const eventSource = new EventSource(`/api/run/${run_id}/events`);
    eventSource.onmessage = (e) => {
      const event = JSON.parse(e.data);
      const agentKey = event.agent || "pm";
      switch (event.type) {
        case "pipeline_start":
          addSystemMessage("パイプライン開始");
          break;
        case "agent_start":
          if (AGENTS[agentKey]) showTyping(agentKey);
          break;
        case "agent_complete":
          if (agentKey.startsWith("pm") && !agentKey.includes("tiebreak")) {
            addBubble(agentKey, formatPM(event.data.output));
          } else if (agentKey.startsWith("engineer")) {
            addBubble(agentKey, formatEngineer(event.data.output));
          } else if (agentKey.startsWith("reviewer")) {
            addBubble(agentKey, formatReviewer(event.data.output));
          } else if (agentKey === "pm_tiebreak") {
            // PM裁定の出力はEngineerまたはReviewer形式
            const output = event.data.output;
            if (output.code_patches) addBubble("pm_tiebreak", formatEngineer(output));
            else addBubble("pm_tiebreak", formatReviewer(output));
          }
          break;
        case "approval_request":
          removeTyping();
          showApprovalDialog(event.data);
          break;
        case "discussion_round":
          addSystemMessage(`${agentKey} 議論ラウンド ${event.data.round || "?"}`);
          break;
        case "discussion_converged":
          addSystemMessage(`${agentKey} の議論が収束しました`);
          break;
        case "pm_tiebreak":
          addSystemMessage("PM が裁定を行います...");
          showTyping("pm");
          break;
        case "rollback_proposed":
          addSystemMessage(`差し戻し提案: ${event.data.proposal?.reason || ""}`);
          break;
        case "rollback_review_start":
          addSystemMessage("PM が差し戻し提案を精査中...");
          showTyping("pm");
          break;
        case "rollback_review_complete":
          removeTyping();
          addSystemMessage("PM 差し戻し判断: " + (event.data.decision?.approved ? "承認" : "棄却"));
          break;
        case "rollback":
          addSystemMessage(`差し戻し実行 (${event.data.attempt || "?"}回目): ${event.data.source} → ${event.data.target}`);
          break;
        case "rollback_limit_reached":
          addSystemMessage(`差し戻し上限 (${event.data.count}回) に到達しました`);
          break;
        case "review_fail_retry":
          addSystemMessage(`レビューFAIL → 修正指示で再実行 (${event.data.attempt || "?"}回目)`);
          break;
        case "pipeline_complete":
          addSystemMessage("パイプライン完了");
          eventSource.close();
          btn.disabled = false;
          currentRunId = null;
          break;
        case "pipeline_error":
          removeTyping();
          addSystemMessage("エラー: " + (event.data.error || "不明なエラー"));
          eventSource.close();
          btn.disabled = false;
          currentRunId = null;
          break;
        case "done":
          eventSource.close();
          btn.disabled = false;
          currentRunId = null;
          break;
      }
    };
    eventSource.onerror = () => {
      removeTyping();
      addSystemMessage("接続が切断されました");
      eventSource.close();
      btn.disabled = false;
    };
  } catch (err) {
    addSystemMessage("送信に失敗しました: " + err.message);
    btn.disabled = false;
  }
}
</script>

</body>
</html>

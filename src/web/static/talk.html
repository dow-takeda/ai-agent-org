<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>談話室 - AI Agent Org</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", sans-serif;
    background: #7494C0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    background: #7494C0;
    color: #fff;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 17px;
    font-weight: 600;
  }
  .header-icon { font-size: 24px; }
  .header-sub { font-size: 12px; font-weight: 400; opacity: 0.8; }
  .header-nav { margin-left: auto; font-size: 13px; font-weight: 500; }
  .header-nav a {
    color: #fff;
    text-decoration: none;
    padding: 6px 12px;
    border: 1px solid rgba(255,255,255,0.5);
    border-radius: 16px;
    transition: background 0.15s;
  }
  .header-nav a:hover { background: rgba(255,255,255,0.15); }

  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px 12px;
    background: #7494C0;
  }

  .welcome {
    text-align: center;
    color: rgba(255,255,255,0.9);
    padding: 40px 20px;
    font-size: 14px;
    line-height: 1.7;
  }
  .welcome-icon { font-size: 42px; margin-bottom: 12px; }

  .msg-row {
    display: flex;
    align-items: flex-start;
    margin: 6px 0;
    animation: pop-in 0.25s ease-out;
  }
  .msg-row.user { justify-content: flex-end; }

  .avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    margin-right: 8px;
    color: #fff;
  }
  .avatar-pm { background: #06C755; }
  .avatar-engineer { background: #5B86E5; }
  .avatar-reviewer { background: #FF6B6B; }
  .avatar-senior_engineer { background: #9B59B6; }

  .msg-content { max-width: 75%; }
  .msg-row.user .msg-content { text-align: right; }

  .msg-name {
    font-size: 12px;
    color: rgba(255,255,255,0.85);
    margin-bottom: 3px;
    font-weight: 500;
  }

  .bubble {
    padding: 10px 14px;
    border-radius: 18px;
    border-top-left-radius: 4px;
    font-size: 14px;
    line-height: 1.6;
    word-break: break-word;
    white-space: pre-wrap;
    box-shadow: 0 1px 1px rgba(0,0,0,0.08);
    display: inline-block;
    text-align: left;
  }
  .bubble-pm { background: #D4F5E0; color: #1a1a1a; }
  .bubble-engineer { background: #D6E4FF; color: #1a1a1a; }
  .bubble-reviewer { background: #FFE0E0; color: #1a1a1a; }
  .bubble-senior_engineer { background: #E8D5F5; color: #1a1a1a; }
  .bubble-user {
    background: #fff;
    color: #1a1a1a;
    border-top-left-radius: 18px;
    border-top-right-radius: 4px;
  }

  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 12px 18px;
  }
  .typing-indicator .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #999;
    animation: typing 1.2s infinite;
  }
  .typing-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing {
    0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
    30% { opacity: 1; transform: scale(1); }
  }
  @keyframes pop-in {
    0% { transform: translateY(8px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }

  .input-area {
    background: #fff;
    padding: 14px 16px;
    border-top: 1px solid #e0e0e0;
  }

  .settings-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 10px;
    align-items: center;
  }
  .settings-row label {
    font-size: 12px;
    font-weight: 600;
    color: #555;
  }
  .settings-row select {
    padding: 6px 10px;
    border: 1px solid #ddd;
    border-radius: 14px;
    font-size: 13px;
    background: #fff;
    outline: none;
  }
  .settings-row select:focus { border-color: #5B86E5; }

  textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid #ddd;
    border-radius: 16px;
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
    min-height: 50px;
    outline: none;
  }
  textarea:focus { border-color: #5B86E5; }

  .bottom-row {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 10px;
    margin-top: 8px;
  }
  .bottom-row .hint {
    font-size: 11px;
    color: #999;
    margin-right: auto;
  }
  .btn-send {
    background: #06C755;
    color: #fff;
    border: none;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-send:hover { background: #05a847; }
  .btn-send:disabled { background: #bbb; cursor: not-allowed; }

  .btn-reset {
    background: #f5f5f5;
    color: #555;
    border: 1px solid #ddd;
    padding: 6px 14px;
    border-radius: 16px;
    font-size: 12px;
    cursor: pointer;
  }
  .btn-reset:hover { background: #eee; }

  .error-msg {
    color: #FF3B30;
    font-size: 12px;
    text-align: center;
    margin: 8px 0;
  }
</style>
</head>
<body>

<div class="header">
  <span class="header-icon">🗨</span>
  <div>
    談話室
    <div class="header-sub">AIエージェントとの自由対話</div>
  </div>
  <div class="header-nav"><a href="/">← 改修作業へ</a></div>
</div>

<div class="chat-area" id="chatArea">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">🗨</div>
    下の設定で役職・パーソナリティ・口調を選んで<br>
    メッセージを送るとエージェントが応答します
  </div>
</div>

<div class="input-area">
  <div class="settings-row">
    <label>役職</label>
    <select id="roleSelect" onchange="onRoleChange()">
      <option value="pm">📋 PM</option>
      <option value="engineer">🔧 Engineer</option>
      <option value="reviewer">🔍 Reviewer</option>
      <option value="senior_engineer">🏗️ Senior Engineer</option>
    </select>
    <label>パーソナリティ</label>
    <select id="personalitySelect"><option value="">（指定なし）</option></select>
    <label>口調</label>
    <select id="toneSelect"><option value="">（指定なし）</option></select>
    <button type="button" class="btn-reset" onclick="resetConversation()">🔄 会話をリセット</button>
  </div>
  <textarea id="messageInput" placeholder="メッセージを入力（Cmd/Ctrl+Enterで送信）"></textarea>
  <div class="bottom-row">
    <span class="hint">設定を変えた後の発言から反映されます</span>
    <button type="button" class="btn-send" id="btnSend" onclick="sendMessage()">▶</button>
  </div>
</div>

<script>
const ROLE_META = {
  pm:              { name: "PM",               avatar: "📋", bubbleClass: "bubble-pm",              avatarClass: "avatar-pm" },
  engineer:        { name: "Engineer",         avatar: "🔧", bubbleClass: "bubble-engineer",        avatarClass: "avatar-engineer" },
  reviewer:        { name: "Reviewer",         avatar: "🔍", bubbleClass: "bubble-reviewer",        avatarClass: "avatar-reviewer" },
  senior_engineer: { name: "Senior Engineer",  avatar: "🏗️", bubbleClass: "bubble-senior_engineer", avatarClass: "avatar-senior_engineer" },
};

let personalities = {};
let tones = [];
const messages = [];

async function loadOptions() {
  const [pRes, tRes] = await Promise.all([
    fetch("/api/personalities").then(r => r.json()),
    fetch("/api/tones").then(r => r.json()),
  ]);
  personalities = pRes;
  tones = tRes;
  populateToneSelect();
  onRoleChange();
}

function populateToneSelect() {
  const sel = document.getElementById("toneSelect");
  sel.innerHTML = '<option value="">（指定なし）</option>';
  for (const t of tones) {
    const opt = document.createElement("option");
    opt.value = t.id;
    opt.textContent = t.name;
    sel.appendChild(opt);
  }
}

function onRoleChange() {
  const role = document.getElementById("roleSelect").value;
  const sel = document.getElementById("personalitySelect");
  sel.innerHTML = '<option value="">（指定なし）</option>';
  const list = personalities[role] || [];
  for (const p of list) {
    const opt = document.createElement("option");
    opt.value = p.id;
    opt.textContent = `${p.name}（${p.focus}）`;
    sel.appendChild(opt);
  }
}

function appendMessage(role, content, isUser) {
  const welcome = document.getElementById("welcome");
  if (welcome) welcome.remove();

  const area = document.getElementById("chatArea");
  const row = document.createElement("div");
  row.className = "msg-row" + (isUser ? " user" : "");

  if (!isUser) {
    const meta = ROLE_META[role] || ROLE_META.pm;
    const av = document.createElement("div");
    av.className = "avatar " + meta.avatarClass;
    av.textContent = meta.avatar;
    row.appendChild(av);
  }

  const contentDiv = document.createElement("div");
  contentDiv.className = "msg-content";
  if (!isUser) {
    const meta = ROLE_META[role] || ROLE_META.pm;
    const nameDiv = document.createElement("div");
    nameDiv.className = "msg-name";
    nameDiv.textContent = meta.name;
    contentDiv.appendChild(nameDiv);
  }
  const bubble = document.createElement("div");
  bubble.className = "bubble " + (isUser ? "bubble-user" : (ROLE_META[role] || ROLE_META.pm).bubbleClass);
  bubble.textContent = content;
  contentDiv.appendChild(bubble);
  row.appendChild(contentDiv);

  area.appendChild(row);
  area.scrollTop = area.scrollHeight;
}

function appendTyping(role) {
  const area = document.getElementById("chatArea");
  const row = document.createElement("div");
  row.className = "msg-row";
  row.id = "typingRow";

  const meta = ROLE_META[role] || ROLE_META.pm;
  const av = document.createElement("div");
  av.className = "avatar " + meta.avatarClass;
  av.textContent = meta.avatar;
  row.appendChild(av);

  const bubble = document.createElement("div");
  bubble.className = "bubble " + meta.bubbleClass;
  const indicator = document.createElement("div");
  indicator.className = "typing-indicator";
  indicator.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
  bubble.appendChild(indicator);
  row.appendChild(bubble);

  area.appendChild(row);
  area.scrollTop = area.scrollHeight;
}

function removeTyping() {
  const row = document.getElementById("typingRow");
  if (row) row.remove();
}

function appendError(text) {
  const area = document.getElementById("chatArea");
  const div = document.createElement("div");
  div.className = "error-msg";
  div.textContent = "⚠ " + text;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById("messageInput");
  const btn = document.getElementById("btnSend");
  const text = input.value.trim();
  if (!text) return;

  const role = document.getElementById("roleSelect").value;
  const personalityId = document.getElementById("personalitySelect").value;
  const toneId = document.getElementById("toneSelect").value;

  messages.push({ role: "user", content: text });
  appendMessage(role, text, true);
  input.value = "";
  btn.disabled = true;
  appendTyping(role);

  try {
    const res = await fetch("/api/talk", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        role,
        personality_id: personalityId || null,
        tone_id: toneId || null,
        messages,
      }),
    });
    const data = await res.json();
    removeTyping();
    if (data.error) {
      appendError(data.error);
      messages.pop();
    } else {
      messages.push({ role: "assistant", content: data.reply });
      appendMessage(role, data.reply, false);
    }
  } catch (e) {
    removeTyping();
    appendError("通信エラー: " + e.message);
    messages.pop();
  } finally {
    btn.disabled = false;
    input.focus();
  }
}

function resetConversation() {
  messages.length = 0;
  const area = document.getElementById("chatArea");
  area.innerHTML = '<div class="welcome" id="welcome"><div class="welcome-icon">🗨</div>会話をリセットしました。<br>新しいメッセージを送信してください</div>';
}

document.getElementById("messageInput").addEventListener("keydown", (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
    e.preventDefault();
    sendMessage();
  }
});

loadOptions();
</script>

</body>
</html>
